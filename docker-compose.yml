# No `container_name:` on any service, on purpose: fixed names are global to the Docker
# host and collide if this file is ever run from two different directories at once (e.g.
# a checkout and a separate deploy folder) — Compose's per-project auto-generated names
# avoid that. Use `docker compose exec <service> ...` / `docker compose cp <service>:...`
# (resolved from the directory you're in) instead of a literal container name.
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: private_macro_desk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d private_macro_desk"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    # Pulled from Docker Hub. To build from local source
    # instead (e.g. active development on the Dockerfile), use:
    #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
    image: sedryx/private-macro-desk:${IMAGE_TAG:-v1-alpha}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overrides the .env value: inside compose, the app must reach Postgres
      # via the service name, not localhost.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/private_macro_desk
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads

  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: postgres
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-1d}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backups_data:/backups
    entrypoint:
      - sh
      - -c
      - |
        echo "[backup] Automated pg_dump every $$BACKUP_INTERVAL, keeping 14 days."
        while true; do
          timestamp=$$(date +%Y%m%d_%H%M%S)
          pg_dump -h postgres -U postgres -d private_macro_desk -F c -f "/backups/backup_$${timestamp}.dump"
          echo "[backup] Wrote backup_$${timestamp}.dump"
          find /backups -name "backup_*.dump" -mtime +14 -delete
          sleep "$$BACKUP_INTERVAL"
        done

volumes:
  postgres_data:
  uploads_data:
  backups_data:
